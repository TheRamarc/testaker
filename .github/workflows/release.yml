name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # 1. Install pnpm FIRST (needed before Node cache setup)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 2. Setup Node with pnpm cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'pnpm'

      # 3. Install Rust stable + macOS universal targets
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # 4. Cache Rust build artifacts
      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 5. Install Linux system dependencies (Tauri v2 requires webkit2gtk-4.1)
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      # 6. Install frontend dependencies
      - name: Install frontend dependencies
        run: pnpm install

      # 7. Build and publish with tauri-action
      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "TNPSC Master v__VERSION__"
          releaseBody: |
            ## What's New
            See the assets below to download and install the latest version.

            ### Downloads
            - **macOS** — `.dmg` (Universal: Apple Silicon + Intel)
            - **Windows** — `.msi` or `.exe` installer
            - **Linux** — `.AppImage` or `.deb`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
